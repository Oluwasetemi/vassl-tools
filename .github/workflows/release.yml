name: Release

on:
  push:
    tags:
      - "v*.*.*"   # trigger on version tags: v0.1.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual runs from GitHub UI

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # GitHub migrated all runners to Node 24 on 2026-06-16; this flag is now
  # a no-op and can be removed after confirming the migration is complete.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── macOS (arm64 + x86_64) ─────────────────────────────────────────────────
  # Both targets use macos-14 (Apple Silicon). Cross-compiling x86_64 on arm64
  # is reliable now that autobins = false ensures cargo-bundle always picks the
  # vassl binary. macos-13 Intel runners have chronic queue delays so we avoid them.
  build-macos:
    name: macOS (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch:   arm64
          - target: x86_64-apple-darwin
            arch:   x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-build-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-build-v2-

      - name: Write signing secret
        env:
          VASSL_SIGNING_SECRET: ${{ secrets.VASSL_SIGNING_SECRET }}
        run: |
          python3 - > crates/vassl-app/src/signing_secret.rs <<'EOF'
          import os, textwrap
          h = os.environ["VASSL_SIGNING_SECRET"]
          pairs = [f"0x{h[i:i+2]}" for i in range(0, 64, 2)]
          rows  = textwrap.fill(", ".join(pairs), width=60, initial_indent="    ", subsequent_indent="    ")
          print(f"const SIGNING_SECRET: [u8; 32] = [\n{rows},\n];")
          EOF

      # macOS alpha builds expire in 3 days — intentionally short to push
      # alpha testers toward fresh releases. Windows uses 90 days (see below).
      - name: Compute build expiry (3 days)
        run: echo "VASSL_BUILD_EXPIRES=$(date -v+3d +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Build release binary
        env:
          VASSL_BUILD_EXPIRES: ${{ env.VASSL_BUILD_EXPIRES }}
        run: cargo build --release --target ${{ matrix.target }} -p vassl-app

      - name: Bundle .app, create ZIP and DMG
        # IMPORTANT: VASSL_BUILD_EXPIRES must be set in both the explicit cargo build
        # step above AND here so that cargo bundle's internal `cargo build` invocation
        # sees the same environment. If the env var differs between steps, Cargo detects
        # option_env!("VASSL_BUILD_EXPIRES") changed and recompiles — but
        # signing_secret.rs no longer exists in this step, causing the re-build to
        # fail and cargo bundle to package a stale stub (~200 KB).
        env:
          VASSL_BUILD_EXPIRES: ${{ env.VASSL_BUILD_EXPIRES }}
        run: |
          cargo install cargo-bundle --locked
          # The explicit build step above already produced the large release binary.
          # cargo bundle re-checks fingerprints; since env vars match, it reuses the
          # cached binary and simply wraps it in the .app structure.
          cargo bundle --release --target ${{ matrix.target }} -p vassl-app

          # Discover the .app bundle — name comes from [package.metadata.bundle]
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle/osx"
          BUNDLE=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.app" | head -1)
          APP_NAME=$(basename "$BUNDLE")
          ARCH="${{ matrix.arch }}"

          # Sanity-check: fail loudly if the binary inside the bundle is < 1 MB,
          # which would indicate the stub/empty-bundle problem recurred.
          BIN_SIZE=$(stat -f%z "${BUNDLE}/Contents/MacOS/"* | awk '{s+=$1} END {print s}')
          if [ "${BIN_SIZE}" -lt 5242880 ]; then
            echo "ERROR: bundled binary is only ${BIN_SIZE} bytes — expected > 5 MB" >&2
            exit 1
          fi

          # ── ZIP (used by the in-app auto-updater) ──────────────────────────
          cd "$BUNDLE_DIR"
          zip -r "$GITHUB_WORKSPACE/VASSL-macos-${ARCH}.zip" "$APP_NAME"
          cd "$GITHUB_WORKSPACE"

          # ── DMG (for first-time / manual installation) ─────────────────────
          mkdir -p dmg-staging
          cp -r "$BUNDLE" dmg-staging/VASSL.app
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "VASSL" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            "VASSL-macos-${ARCH}.dmg"
          rm -rf dmg-staging

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VASSL-macos-${{ matrix.arch }}
          path: |
            VASSL-macos-${{ matrix.arch }}.zip
            VASSL-macos-${{ matrix.arch }}.dmg
          retention-days: 30

  # ─── Universal macOS .app (lipo arm64 + x86_64) ─────────────────────────────
  macos-universal:
    name: macOS universal binary
    needs: build-macos
    runs-on: macos-14

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VASSL-macos-arm64
          path: arm64

      - uses: actions/download-artifact@v4
        with:
          name: VASSL-macos-x86_64
          path: x86_64

      - name: Create universal .app, ZIP and DMG
        run: |
          # Extract both .app bundles
          unzip arm64/VASSL-macos-arm64.zip   -d arm64-out
          unzip x86_64/VASSL-macos-x86_64.zip -d x86_64-out

          # Discover .app name dynamically (matches whatever cargo-bundle created)
          APP_NAME=$(find arm64-out -maxdepth 1 -name "*.app" | head -1 | xargs basename)
          BIN_NAME=$(ls "arm64-out/${APP_NAME}/Contents/MacOS/" | head -1)

          # Start from the arm64 bundle (has correct Info.plist / resources)
          cp -r "arm64-out/${APP_NAME}" universal-app

          # Merge the two binaries into a universal binary
          lipo -create \
            "arm64-out/${APP_NAME}/Contents/MacOS/${BIN_NAME}" \
            "x86_64-out/${APP_NAME}/Contents/MacOS/${BIN_NAME}" \
            -output "universal-app/Contents/MacOS/${BIN_NAME}"

          # ── ZIP (auto-updater) — must contain .app at root ────────────────
          mv universal-app "${APP_NAME}"
          zip -r VASSL-macos-universal.zip "${APP_NAME}"
          mv "${APP_NAME}" universal-app

          # ── DMG (manual install) ────────────────────────────────────────────
          mkdir -p dmg-staging
          cp -r universal-app "dmg-staging/${APP_NAME}"
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "VASSL" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            VASSL-macos-universal.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: VASSL-macos-universal
          path: |
            VASSL-macos-universal.zip
            VASSL-macos-universal.dmg
          retention-days: 30

  # ─── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-x86_64-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-x86_64-build-

      - name: Write signing secret
        shell: pwsh
        env:
          VASSL_SIGNING_SECRET: ${{ secrets.VASSL_SIGNING_SECRET }}
        run: |
          $h = $env:VASSL_SIGNING_SECRET
          $pairs = 0..31 | ForEach-Object { "0x$($h.Substring($_*2,2))" }
          $body  = $pairs -join ", "
          "const SIGNING_SECRET: [u8; 32] = [$body];" |
            Out-File -FilePath "crates/vassl-app/src/signing_secret.rs" -Encoding utf8

      - name: Compute build expiry (90 days)
        shell: pwsh
        run: |
          $expiry = (Get-Date).AddDays(90).ToString('yyyy-MM-dd')
          echo "VASSL_BUILD_EXPIRES=$expiry" >> $env:GITHUB_ENV

      - name: Build release binary
        env:
          VASSL_BUILD_EXPIRES: ${{ env.VASSL_BUILD_EXPIRES }}
        run: cargo build --release --target x86_64-pc-windows-msvc -p vassl-app

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked --version "^0.3"

      - name: Build MSI installer
        run: cargo wix -p vassl-app --no-build --nocapture
        # Output: target/wix/vassl-<version>-x86_64.msi

      - name: Rename artifacts
        shell: pwsh
        run: |
          # ZIP (portable — no install required)
          Compress-Archive `
            -Path "target\x86_64-pc-windows-msvc\release\vassl.exe" `
            -DestinationPath "$env:GITHUB_WORKSPACE\VASSL-windows-x86_64.zip"

          # MSI (installer)
          $msi = Get-ChildItem target\wix\*.msi | Select-Object -First 1
          Copy-Item $msi.FullName "$env:GITHUB_WORKSPACE\VASSL-windows-x86_64.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: VASSL-windows-x86_64
          path: |
            VASSL-windows-x86_64.zip
            VASSL-windows-x86_64.msi
          retention-days: 30

  # ─── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-macos, macos-universal, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: VASSL ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/VASSL-macos-arm64/VASSL-macos-arm64.zip
            artifacts/VASSL-macos-arm64/VASSL-macos-arm64.dmg
            artifacts/VASSL-macos-x86_64/VASSL-macos-x86_64.zip
            artifacts/VASSL-macos-x86_64/VASSL-macos-x86_64.dmg
            artifacts/VASSL-macos-universal/VASSL-macos-universal.zip
            artifacts/VASSL-macos-universal/VASSL-macos-universal.dmg
            artifacts/VASSL-windows-x86_64/VASSL-windows-x86_64.zip
            artifacts/VASSL-windows-x86_64/VASSL-windows-x86_64.msi
