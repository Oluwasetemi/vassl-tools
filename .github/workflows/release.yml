name: Release

on:
  push:
    tags:
      - "v*.*.*"   # trigger on version tags: v0.1.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual runs from GitHub UI

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (${{ matrix.target }})
    runs-on: macos-14   # Apple Silicon runner
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch:   arm64
          - target: x86_64-apple-darwin
            arch:   x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: tools/target
          key: ${{ runner.os }}-${{ matrix.target }}-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-build-

      - name: Build release binary
        working-directory: tools
        run: cargo build --release --target ${{ matrix.target }} -p vassl-app

      - name: Package .app bundle (arm64 only)
        if: matrix.arch == 'arm64'
        working-directory: tools
        run: |
          # Install cargo-bundle
          cargo install cargo-bundle --locked
          cargo bundle --release --target ${{ matrix.target }} -p vassl-app

          # Create a distributable zip
          cd target/${{ matrix.target }}/release/bundle/osx
          zip -r VASSL-macos-${{ matrix.arch }}.zip VASSL.app
          mv VASSL-macos-${{ matrix.arch }}.zip $GITHUB_WORKSPACE/

      - name: Package bare binary (x86_64)
        if: matrix.arch == 'x86_64'
        working-directory: tools
        run: |
          zip -j VASSL-macos-${{ matrix.arch }}.zip \
              target/${{ matrix.target }}/release/vassl
          mv VASSL-macos-${{ matrix.arch }}.zip $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VASSL-macos-${{ matrix.arch }}
          path: VASSL-macos-${{ matrix.arch }}.zip
          retention-days: 30

  # ─── Universal macOS binary (lipo arm64 + x86_64) ───────────────────────────
  macos-universal:
    name: macOS universal binary
    needs: build-macos
    runs-on: macos-14

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VASSL-macos-arm64
          path: arm64

      - uses: actions/download-artifact@v4
        with:
          name: VASSL-macos-x86_64
          path: x86_64

      - name: Create universal binary
        run: |
          unzip arm64/VASSL-macos-arm64.zip -d arm64-out
          unzip x86_64/VASSL-macos-x86_64.zip -d x86_64-out
          mkdir -p universal
          lipo -create \
            arm64-out/vassl \
            x86_64-out/vassl \
            -output universal/vassl || \
          lipo -create \
            "arm64-out/VASSL.app/Contents/MacOS/vassl" \
            x86_64-out/vassl \
            -output universal/vassl
          zip -j VASSL-macos-universal.zip universal/vassl

      - uses: actions/upload-artifact@v4
        with:
          name: VASSL-macos-universal
          path: VASSL-macos-universal.zip
          retention-days: 30

  # ─── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: tools/target
          key: ${{ runner.os }}-x86_64-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-x86_64-build-

      - name: Build release binary
        working-directory: tools
        run: cargo build --release --target x86_64-pc-windows-msvc -p vassl-app

      - name: Package
        working-directory: tools
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target\x86_64-pc-windows-msvc\release\vassl.exe" `
            -DestinationPath "VASSL-windows-x86_64.zip"
          Move-Item VASSL-windows-x86_64.zip $env:GITHUB_WORKSPACE\

      - uses: actions/upload-artifact@v4
        with:
          name: VASSL-windows-x86_64
          path: VASSL-windows-x86_64.zip
          retention-days: 30

  # ─── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-macos, macos-universal, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: VASSL ${{ github.ref_name }}
          draft: true          # review before publishing
          generate_release_notes: true
          files: |
            artifacts/VASSL-macos-arm64/VASSL-macos-arm64.zip
            artifacts/VASSL-macos-x86_64/VASSL-macos-x86_64.zip
            artifacts/VASSL-macos-universal/VASSL-macos-universal.zip
            artifacts/VASSL-windows-x86_64/VASSL-windows-x86_64.zip
