<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>VASSL Logo Mark Preview</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      padding: 40px;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      color: #ccc;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    label { font-size: 13px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="card">
    <label>200 × 200</label>
    <img src="logo-mark.svg" width="200" height="200"/>
  </div>
  <div class="card">
    <label>96 × 96</label>
    <img src="logo-mark.svg" width="96" height="96"/>
  </div>
  <div class="card">
    <label>48 × 48 (sidebar)</label>
    <img src="logo-mark.svg" width="48" height="48"/>
  </div>
  <div class="card">
    <label>36 × 36 (button)</label>
    <img src="logo-mark.svg" width="36" height="36"/>
  </div>
  <div class="card">
    <label>on light bg</label>
    <div style="background:#fff;padding:16px;border-radius:8px;">
      <img src="logo-mark.svg" width="96" height="96"/>
    </div>
  </div>
</body>
</html>
