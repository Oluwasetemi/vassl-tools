<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Emerald iris: bright teal highlight → deep forest -->
    <radialGradient id="iris" cx="38%" cy="33%" r="65%">
      <stop offset="0%"   stop-color="#52f0c0"/>
      <stop offset="30%"  stop-color="#00c48a"/>
      <stop offset="70%"  stop-color="#007a56"/>
      <stop offset="100%" stop-color="#003d28"/>
    </radialGradient>

    <!-- Pupil: near-black -->
    <radialGradient id="pupil" cx="30%" cy="28%" r="70%">
      <stop offset="0%"   stop-color="#14281e"/>
      <stop offset="100%" stop-color="#000805"/>
    </radialGradient>

    <!-- Sclera -->
    <radialGradient id="sclera" cx="40%" cy="35%" r="62%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="75%"  stop-color="#f2f8f5"/>
      <stop offset="100%" stop-color="#c8ddd6"/>
    </radialGradient>

    <!-- Specular sheen on iris -->
    <radialGradient id="sheen" cx="32%" cy="22%" r="52%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.50"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00"/>
    </radialGradient>
  </defs>

  <!-- ── Step 1: full arrowhead in crimson (the base layer) ─────────── -->
  <polygon points="5,5 5,195 190,100" fill="#c4122a"/>

  <!-- ── Step 2: navy upper portion painted on top ──────────────────── -->
  <!-- Covers the top ~65 % of the arrowhead height, same right apex.  -->
  <polygon points="5,5 5,128 190,100" fill="#1a2b6d"/>

  <!-- ── Eye / security globe ────────────────────────────────────────── -->

  <!-- Sclera (white) -->
  <circle cx="88" cy="82" r="44" fill="url(#sclera)"/>

  <!-- Emerald iris (globe) -->
  <circle cx="88" cy="82" r="34" fill="url(#iris)"/>

  <!-- Globe latitude lines -->
  <ellipse cx="88" cy="82" rx="34" ry="13"
           fill="none" stroke="#003d28" stroke-width="1.4" opacity="0.50"/>
  <ellipse cx="88" cy="82" rx="34" ry="26"
           fill="none" stroke="#003d28" stroke-width="0.9" opacity="0.35"/>

  <!-- Globe meridian (vertical) -->
  <ellipse cx="88" cy="82" rx="14" ry="34"
           fill="none" stroke="#003d28" stroke-width="1.2" opacity="0.45"/>

  <!-- Specular sheen -->
  <circle cx="88" cy="82" r="34" fill="url(#sheen)"/>

  <!-- Pupil -->
  <circle cx="88" cy="82" r="13" fill="url(#pupil)"/>

  <!-- Primary catchlight -->
  <circle cx="78" cy="71" r="6.5" fill="white" opacity="0.95"/>

  <!-- Secondary catchlight -->
  <circle cx="96" cy="90" r="2.5" fill="white" opacity="0.45"/>
</svg>
