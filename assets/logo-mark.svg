<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Emerald iris -->
    <radialGradient id="iris" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#52f0c0"/>
      <stop offset="28%"  stop-color="#00c48a"/>
      <stop offset="68%"  stop-color="#007a56"/>
      <stop offset="100%" stop-color="#003d28"/>
    </radialGradient>

    <!-- Pupil -->
    <radialGradient id="pupil" cx="30%" cy="28%" r="70%">
      <stop offset="0%"   stop-color="#14281e"/>
      <stop offset="100%" stop-color="#000805"/>
    </radialGradient>

    <!-- Sclera -->
    <radialGradient id="sclera" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="80%"  stop-color="#eef6f2"/>
      <stop offset="100%" stop-color="#c0d8d0"/>
    </radialGradient>

    <!-- Iris sheen -->
    <radialGradient id="sheen" cx="30%" cy="20%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.60"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00"/>
    </radialGradient>
  </defs>

  <!-- ── Navy: base across the TOP, tip at BOTTOM-LEFT ─────────────────
       Fills the left/upper half of the rectangle.                    -->
  <polygon points="0,0 200,0 0,200" fill="#1a2b6d"/>

  <!-- ── Crimson: base across the BOTTOM, tip at TOP-RIGHT ─────────────
       Fills the right/lower half — together both cover the full rect. -->
  <polygon points="200,0 200,200 0,200" fill="#c4122a"/>

  <!-- ── Emerald security eye — dead centre where the diagonal crosses ─ -->

  <!-- Sclera -->
  <circle cx="100" cy="100" r="42" fill="url(#sclera)"/>

  <!-- Emerald iris (globe) -->
  <circle cx="100" cy="100" r="32" fill="url(#iris)"/>

  <!-- Globe latitude lines -->
  <ellipse cx="100" cy="100" rx="32" ry="12"
           fill="none" stroke="#003d28" stroke-width="1.3" opacity="0.48"/>
  <ellipse cx="100" cy="100" rx="32" ry="24"
           fill="none" stroke="#003d28" stroke-width="0.8" opacity="0.30"/>

  <!-- Globe meridian -->
  <ellipse cx="100" cy="100" rx="13" ry="32"
           fill="none" stroke="#003d28" stroke-width="1.0" opacity="0.40"/>

  <!-- Specular sheen -->
  <circle cx="100" cy="100" r="32" fill="url(#sheen)"/>

  <!-- Pupil -->
  <circle cx="100" cy="100" r="12" fill="url(#pupil)"/>

  <!-- Primary catchlight -->
  <circle cx="91"  cy="90"  r="5.5" fill="white" opacity="0.95"/>

  <!-- Secondary catchlight -->
  <circle cx="109" cy="109" r="2.2" fill="white" opacity="0.40"/>
</svg>
